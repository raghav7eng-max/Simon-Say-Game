<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="head">
        <h1>Simon Says Game</h1>
        <h2>Press any key to start</h2>
    </div>
    <div id="container">
        <div class="box" id="one" type="button"></div>
        <div class="box" id="two" type="button"></div>
        <div class="box" id="three" type="button"></div>
        <div class="box" id="four" type="button"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
